# ============================================================
#  controllers.yaml — Smart Trolley V5
#  Controladores ros2_control — REAL HARDWARE + SIMULACIÓN
#
#  Reemplaza sim_controllers.yaml.
#  El mismo archivo se usa con TrolleyHardwareInterface (real)
#  y con GazeboSimSystem (sim), solo cambia el plugin de hardware
#  declarado en ros2_control.xacro.
# ============================================================

controller_manager:
  ros__parameters:
    update_rate: 50          # Hz

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


# ── Differential Drive Controller ────────────────────────────────────────────
diff_drive_controller:
  ros__parameters:
    # Joints (deben coincidir con el URDF)
    left_wheel_names:  ["joint_lh"]
    right_wheel_names: ["joint_rh"]

    # Parámetros físicos
    wheel_separation: 0.48           # m
    wheel_radius:     0.10           # m

    # Frames TF
    odom_frame_id:  odom
    base_frame_id:  base_link

    # Covarianza odometría
    pose_covariance_diagonal:  [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]

    # Publicación
    publish_rate:     50.0
    use_stamped_vel:  false   # suscribe a ~/cmd_vel_unstamped

    # Odometría cerrada (usa feedback de encoders)
    open_loop:        false
    enable_odom_tf:   true

    # Seguridad
    cmd_vel_timeout:             0.5   # s — parar si no llegan comandos
    publish_limited_velocity:    true
    velocity_rolling_window_size: 10

    # ── Límites de velocidad ──────────────────────────────────────────────
    linear:
      x:
        has_velocity_limits:     true
        max_velocity:            0.5    # m/s
        min_velocity:           -0.5   # m/s
        has_acceleration_limits: true
        max_acceleration:        0.8   # m/s²
        min_acceleration:       -0.8   # m/s²
        has_jerk_limits:         false

    angular:
      z:
        has_velocity_limits:     true
        max_velocity:            1.0   # rad/s
        min_velocity:           -1.0  # rad/s
        has_acceleration_limits: true
        max_acceleration:        1.5   # rad/s²
        min_acceleration:       -1.5  # rad/s²
        has_jerk_limits:         false
