# ============================================================
#  sim_controllers.yaml — Smart Trolley V5
#  Controladores ros2_control para simulación Gazebo
#  Consolida: ros2_controllers.yaml + trolley_controllers.yaml
# ============================================================

controller_manager:
  ros__parameters:
    update_rate: 50          # Hz

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


# ── Differential Drive Controller ───────────────────────────────────────────
diff_drive_controller:
  ros__parameters:
    # Joints de las ruedas (deben coincidir con el URDF)
    left_wheel_names: ["joint_lh"]
    right_wheel_names: ["joint_rh"]

    # Parámetros físicos (mismos que hardware.yaml)
    wheel_separation: 0.48           # metros
    wheel_radius: 0.10               # metros

    # Frames
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal:  [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]

    # Publicación
    publish_rate: 50.0
    use_stamped_vel: false

    # Control
    open_loop: false                 # false = usar feedback de encoders
    enable_odom_tf: true             # Publicar TF de odometría

    # Timeouts y comportamiento
    cmd_vel_timeout: 0.5             # Timeout para comandos de velocidad (s)
    publish_limited_velocity: true
    velocity_rolling_window_size: 10

    # ── Límites de velocidad ───────────────────────────────────────────────
    linear:
      x:
        has_velocity_limits:    true
        max_velocity:           0.5   # m/s  (adelante)
        min_velocity:          -0.5   # m/s  (atrás)
        has_acceleration_limits: true
        max_acceleration:       0.8   # m/s²
        min_acceleration:      -0.8   # m/s²
        has_jerk_limits:        false

    angular:
      z:
        has_velocity_limits:    true
        max_velocity:           1.0   # rad/s
        min_velocity:          -1.0   # rad/s
        has_acceleration_limits: true
        max_acceleration:       1.5   # rad/s²
        min_acceleration:      -1.5   # rad/s²
        has_jerk_limits:        false

    # ── Calibración (multiplicadores) ──────────────────────────────────────
    # Ajustar si la odometría no coincide con el movimiento real
    wheel_separation_multiplier:    1.0
    left_wheel_radius_multiplier:   1.0
    right_wheel_radius_multiplier:  1.0


# ── Joint State Broadcaster ─────────────────────────────────────────────────
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
    extra_joints: []
